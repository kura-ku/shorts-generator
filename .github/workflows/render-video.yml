name: Render Video

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm run render

      - uses: actions/upload-artifact@v4
        with:
          name: video
          path: output/video.mp4
